    title: section.title,
    subtitle: section.subtitle,
    description: section.description,
    figureNumber: section.figureNumber,
    caption: section.caption,
    points: section.points || [],
    images: section.images || [],
    columns: section.columns,
    layout: section.layout,
    steps: section.steps,
    tabs: section.tabs,
    fit: section.fit || "contain",
  };

  switch (section.type) {
    case 'figure':
      return React.createElement(PptFigureSection, props);
    case 'comparison':
      return React.createElement(ComparisonRow, props);
    case 'wall':
      return React.createElement(ImageWall, props);
    case 'mosaic':
      return React.createElement(MosaicGallery, props);
    case 'timeline':
      return React.createElement(TimelineGallery, props);
    case 'card':
      return React.createElement(ImageCard, props);
    case 'feature':
      return React.createElement(FeatureShowcase, props);
    case 'tabbed':
      return React.createElement(TabbedGallery, props);

      return React.createElement('div', { className: "p-8 bg-yellow-50 rounded-xl border border-yellow-200 text-sm text-yellow-700" },

/* ============================================
   SEARCH OVERLAY COMPONENT
   Enhanced command palette style
   ============================================ */
const SearchOverlay = ({ isOpen, onClose }) => {
  const [query, setQuery] = React.useState('');
  const [results, setResults] = React.useState([]);
  const [selectedIndex, setSelectedIndex] = React.useState(0);

  React.useEffect(() => {
    if (!query.trim()) {
      setResults([]);
      setSelectedIndex(0);
      return;
    }

    const q = query.toLowerCase().split(/\s+/);
    const scored = SEARCH_INDEX.map(item => {
      const text = `${item.q} ${item.a} ${item.cat} ${item.keywords?.join(' ') || ''}`.toLowerCase();
      const score = q.reduce((acc, token) => acc + (text.includes(token) ? 1 : 0), 0);
      return { ...item, score };
    }).filter(item => item.score > 0).sort((a, b) => b.score - a.score);

    setResults(scored);
    setSelectedIndex(0);
  }, [query]);

  const handleKeyDown = (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setSelectedIndex(i => Math.min(i + 1, results.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setSelectedIndex(i => Math.max(i - 1, 0));
    } else if (e.key === 'Enter' && results[selectedIndex]) {
      setQuery(results[selectedIndex].q);
    }
  };

  const RECOMMENDED_TAGS = ['降解', '力学', '防伪', '透明', '磷光', '工艺'];

  if (!isOpen) return null;

  return React.createElement('div', {
    className: "fixed inset-0 z-[100] bg-slate-900/70 backdrop-blur-md flex items-start justify-center pt-24 px-4",
    onClick: onClose
  },
    React.createElement('div', {
      className: "w-full max-w-xl bg-white rounded-2xl shadow-2xl overflow-hidden",
      onClick: e => e.stopPropagation()
    },
      React.createElement('div', { className: "p-5 border-b border-slate-100 flex items-center gap-3" },
        React.createElement(Icons.Search, { size: 24, className: "text-slate-400 shrink-0" }),
        React.createElement('input', {
          autoFocus: true,
          placeholder: '搜索关键词（如：降解、透明度、PPT示意图）...',
          className: 'flex-1 outline-none text-lg text-slate-900 placeholder:text-slate-400',
          value: query,
          onChange: e => setQuery(e.target.value),
          onKeyDown: handleKeyDown
        }),
        React.createElement('button', {
          onClick: onClose,
          className: 'p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400'
        }, React.createElement(Icons.X, { size: 24 }))
      ),
      React.createElement('div', { className: "max-h-[60vh] overflow-y-auto" },
        query ? (
          results.length > 0 ? (
            React.createElement('div', { className: "p-2" },
              results.map((item, i) => (
                React.createElement('div', {
                  key: item.id,
                  onClick: () => setQuery(item.q),
                  className: `p-4 rounded-xl cursor-pointer transition-all ${i === selectedIndex ? 'bg-blue-50 border border-blue-200' : 'hover:bg-slate-50'}` },
                  React.createElement('span', { className: "text-sm font-semibold uppercase text-blue-600 tracking-wide" }, item.cat),
                  React.createElement('h4', { className: "text-base font-semibold text-slate-900 mt-1" }, item.q),
                  React.createElement('p', { className: "text-base text-slate-500 mt-1 leading-relaxed" }, item.a)
                )
              ))
            )
          ) : (
            React.createElement('div', { className: "py-12 text-center text-slate-400" },
              React.createElement('p', { className: "text-base" }, '未找到相关结果'),
              React.createElement('p', { className: "text-sm mt-1" }, '尝试其他关键词')
            )
